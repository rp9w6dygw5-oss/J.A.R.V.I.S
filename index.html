<!DOCTYPE html>
<html>
<head>
<title>J.A.R.V.I.S.</title>

<style>
body {
  background: black;
  color: cyan;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  margin-top: 50px;
  font-size: 50px;
  text-shadow: 0 0 20px cyan;
}

.circle {
  width: 220px;
  height: 220px;
  border: 5px solid cyan;
  border-radius: 50%;
  margin: 50px auto;
  box-shadow: 0 0 40px cyan;
  animation: pulse 2s infinite;
}

p {
  font-size: 22px;
}

button {
  background: transparent;
  color: cyan;
  border: 2px solid cyan;
  padding: 15px 30px;
  border-radius: 20px;
  font-size: 20px;
}

@keyframes pulse {
  0% {
    box-shadow: 0 0 20px cyan;
  }
  50% {
    box-shadow: 0 0 60px cyan;
  }
  100% {
    box-shadow: 0 0 20px cyan;
  }
}

</style>
</head>

<body>

<h1>J.A.R.V.I.S.</h1>

<div class="circle"></div>

<p>Sistema online...</p>

<button>Attiva voce</button>

</body>
</html>
